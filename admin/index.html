<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin Login — Erzal & Dhea</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="admin-login">
    <div class="admin-card">
      <h1>Dashboard Kehadiran</h1>
      <p class="subtitle">Erzal &amp; Dhea — masuk untuk melihat RSVP dan ucapan tamu.</p>

      <div id="loginAlert" class="alert" hidden role="alert"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Admin</label>
          <input type="email" id="email" name="email" required autocomplete="username" placeholder="admin@example.com">
        </div>
        <div class="form-group">
          <label for="password">Kata Sandi</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn--primary btn--block" id="loginBtn">Masuk</button>
      </form>

      <p class="admin-footer-link">
        <a href="../index.html">&larr; Kembali ke undangan</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
  <script>
    (function () {
      'use strict';
      if (window.AdminApp && window.AdminApp.isConfigured()) {
        window.AdminApp.requireGuest('dashboard.html');
      }
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertEl = document.getElementById('loginAlert');
        const btn = document.getElementById('loginBtn');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!window.AdminApp || !window.AdminApp.isConfigured()) {
          alertEl.hidden = false;
          alertEl.className = 'alert alert--error';
          alertEl.textContent = 'Supabase belum dikonfigurasi. Isi admin/config.js terlebih dahulu.';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Memproses...';
        alertEl.hidden = true;

        try {
          await window.AdminApp.signIn(email, password);
          window.location.href = 'dashboard.html';
        } catch (err) {
          alertEl.hidden = false;
          alertEl.className = 'alert alert--error';
          alertEl.textContent = err.message || 'Gagal masuk. Periksa email dan kata sandi.';
        } finally {
          btn.disabled = false;
          btn.textContent = 'Masuk';
        }
      });
    })();
  </script>
</body>
</html>
