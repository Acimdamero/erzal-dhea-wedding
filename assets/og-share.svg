<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Wedding Invitation Erzal and Dhea">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2418"/>
      <stop offset="50%" stop-color="#2c3328"/>
      <stop offset="100%" stop-color="#1a1a18"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a8895e"/>
      <stop offset="50%" stop-color="#e8d5b5"/>
      <stop offset="100%" stop-color="#a8895e"/>
    </linearGradient>
    <pattern id="arabesque" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M30 0 L60 30 L30 60 L0 30 Z" fill="none" stroke="#c4a882" stroke-width="0.5" opacity="0.15"/>
      <circle cx="30" cy="30" r="8" fill="none" stroke="#c4a882" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#arabesque)"/>
  <!-- Mihrab arch silhouette -->
  <path d="M600 120 L420 120 L420 380 Q600 520 780 380 L780 120 Z" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.7"/>
  <!-- Kaaba silhouette -->
  <rect x="540" y="300" width="120" height="100" fill="#1a1a18" stroke="url(#gold)" stroke-width="2"/>
  <rect x="535" y="340" width="130" height="18" fill="url(#gold)" opacity="0.85"/>
  <!-- Crescent -->
  <path d="M600 200 A35 35 0 1 1 600 270 A25 25 0 1 0 600 200" fill="url(#gold)" opacity="0.8"/>
  <!-- Title -->
  <text x="600" y="460" text-anchor="middle" fill="#e8d5b5" font-family="Georgia, serif" font-size="42" letter-spacing="4">Erzal &amp; Dhea</text>
  <text x="600" y="510" text-anchor="middle" fill="#8b9a7e" font-family="Georgia, serif" font-size="22" letter-spacing="6">WEDDING INVITATION</text>
  <text x="600" y="560" text-anchor="middle" fill="#c4a882" font-family="Georgia, serif" font-size="16" letter-spacing="2">13 &amp; 22 Juli 2026</text>
</svg>
